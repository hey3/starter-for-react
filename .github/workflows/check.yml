name: Check

on: pull_request

jobs:
  check:
    name: lint and compile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint
        run: |
          pnpm lint
          pnpm format

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run test
        run: pnpm test

      - name: Run compile
        run: pnpm build
