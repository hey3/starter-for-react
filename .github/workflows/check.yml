name: Check

on: pull_request

jobs:
  check:
    name: lint and compile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint
        run: |
          pnpm lint
          pnpm format

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run test
        run: pnpm test

      - name: Run compile
        run: pnpm build
