name: Check

on: pull_request

jobs:
  check:
    name: lint and compile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint
        run: |
          pnpm lint
          pnpm format

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run test
        run: pnpm test

      - name: Run compile
        run: pnpm build
